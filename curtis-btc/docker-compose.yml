version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: curtis-btc_web_1
      APP_PORT: 8080
    depends_on:
      - web

  web:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "8080"
    command: /bin/sh -c "sed -i 's/listen       80;/listen 8080;/' /etc/nginx/conf.d/default.conf && echo '<h1>Curtis BTC Test</h1>' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"